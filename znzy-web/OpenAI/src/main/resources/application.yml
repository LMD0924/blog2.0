spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zhly
    username: root
    password: 0924
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    openai:
      base-url: https://yinli.one/
      api-key: sk-HhDe9LTWQRl8XevaB6IO4Qmr4oWdLhlgx9ATDZbtvhF1Ys6i
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.7

# 在线编译器配置
compiler:
  # 临时工作目录
  workspace: /tmp/compiler_workspace
  # Windows系统可以使用
  # workspace: C:/tmp/compiler_workspace

  # 超时配置（毫秒）
  timeout:
    compile: 10000    # 编译超时10秒
    execute: 5000     # 执行超时5秒

  # 资源限制
  resource:
    max-memory: 256   # 最大内存256MB
    max-cpu-time: 10  # 最大CPU时间10秒

  # 安全配置
  security:
    max-code-length: 10000  # 最大代码长度
    banned-words:          # 禁止使用的关键词
      - "System.exit"
      - "Runtime.getRuntime"
      - "ProcessBuilder"
      - "exec("
      - "fork("
      - "popen("
      - "system("

# 文件上传配置
file:
  upload-dir: uploads/

# 服务器配置
server:
  port: 8080

# 日志配置
logging:
  level:
    org.springframework.ai.chat.client.advisor: debug
    org.example.openai: debug
    com.example.onlinecompiler: info  # 编译器日志级别
    org.springframework.web: info

  # JPA配置（如果需要数据库）
  jpa:
    hibernate:
      ddl-auto: update  # 开发环境使用update，生产环境使用validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

